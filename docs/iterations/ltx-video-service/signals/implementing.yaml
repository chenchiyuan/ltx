    - id: NO_GIT_REPOSITORY
      description: "当前目录不是 git repository，无法按任务创建 commit。"
      severity: MINOR
      points_to_upstream: false
    - id: POSTGRES_MINIO_NOT_RUNTIME_VERIFIED
      description: "本机验证使用 SQLite 与 LocalObjectStorage；PostgreSQL/MinIO 需在目标测试机补充运行态验证。"
      severity: MINOR
      points_to_upstream: false
  assumptions:
    - id: PHASE1_NO_GPU
      summary: "Phase 1 严格排除 GPU 服务器、ComfyUI/LTX 真实执行、K8s/GPU Operator、DCGM 和 Worker Registry。"
