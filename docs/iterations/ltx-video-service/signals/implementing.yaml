  verification:
    - command: "python3 -m pytest"
      result: "25 passed"
    - command: "python3 -m compileall -q src tests gpu_server/worker_adapter"
      result: passed
    - command: "bash -n gpu_server/scripts/*.sh"
      result: passed
    - command: "docker compose --env-file /private/tmp/ltx-gpu.env -f gpu_server/docker-compose.yml config --quiet"
      result: passed
    - command: "git diff --check"
      result: passed
    - command: "ssh 162.62.55.111 'cd ~/projects/ltx/gpu_server && ./scripts/healthcheck.sh'"
      result: "control-plane healthy, executor gpu-worker healthy, worker_count=8"
    - command: "ssh 162.62.55.111 'cd ~/projects/ltx/gpu_server && docker compose --env-file .env ps'"
      result: "control-plane healthy; worker-0..worker-7 running"
    - command: "ssh 162.62.55.111 admin workers query"
      result: "8 workers registered; each reports comfyui_healthy=true and status=unhealthy with not_ready_reason=T204_ADAPTER_SKELETON"
    - command: "ssh 162.62.55.111 'cd ~/projects/ltx/gpu_server && docker compose --env-file .env exec -T worker-0 nvidia-smi -L'"
      result: "GPU 0: NVIDIA L20 visible inside worker container"
  issues:
    - id: REAL_MODEL_FILES_NOT_VERIFIED
      description: "T-205 已实现模型清单检查和 ComfyUI 模型目录挂载修正，但远端真实模型文件尚未下载验证；Gemma text encoder 可能需要 HF token 和 license acceptance。"
      severity: MAJOR
      points_to_upstream: false
      gate_candidate: G4
    - id: PUBLIC_8000_NOT_REACHING_APP
      description: "服务器内 127.0.0.1:8000/health 正常，0.0.0.0:8000 由 Docker proxy 监听，ufw inactive；但从本机访问 162.62.55.111:8000 未进入 uvicorn access log，需要在云安全组/公网入口放通或改用反向代理。"
      severity: MAJOR
      points_to_upstream: false
      gate_candidate: G4
    - id: REAL_GPU_SMOKE_NOT_EXECUTED
      description: "Worker Adapter 已实现 /prompt、history 轮询和 event 回调边界，但真实 LTX 生成 smoke 仍依赖模型文件到位和 WORKER_STATUS=idle。"
      severity: MINOR
      points_to_upstream: false
      gate_candidate: G4
  assumptions:
    - id: T205_T206_SCOPE
      summary: "本次完成模型缓存边界、workflow save-format 转 API Format、Worker assignment HTTP 和 Worker event 回调，不把未完成模型下载伪装为真实可用。"
    - id: WORKER_SAFETY_STATUS
      summary: "远端 .env 保持 WORKER_STATUS=unhealthy，防止真实 Adapter 未完成前被 Dispatcher 领取任务。"
    - id: SAME_HOST_CONTROL_PLANE
      summary: "162.62.55.111 既运行 control-plane，也运行 8 个单 GPU worker。"
