<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LTX Video Console</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">LTX 2.3 / ComfyUI Deploy</p>
          <h1>Video Generation Console</h1>
        </div>
        <div class="health" id="healthState">checking</div>
      </header>

      <section class="credentials" aria-label="API credentials">
        <label>
          API Key
          <input id="apiKey" type="password" autocomplete="off" placeholder="Bearer key" />
        </label>
        <label>
          Admin Token
          <input id="adminToken" type="password" autocomplete="off" placeholder="optional for ops" />
        </label>
        <button class="secondary" id="saveKeys" type="button">保存</button>
      </section>

      <section class="workspace">
        <form class="composer" id="generationForm">
          <div class="mode-switch" role="tablist" aria-label="Generation mode">
            <button type="button" class="mode active" data-mode="text_to_video">文生视频</button>
            <button type="button" class="mode" data-mode="image_to_video">图生视频</button>
          </div>

          <label>
            Prompt
            <textarea id="prompt" rows="7" required placeholder="a clean product shot of a ceramic cup, gentle camera movement"></textarea>
          </label>

          <label>
            Negative Prompt
            <textarea id="negativePrompt" rows="3" placeholder="blur, artifacts, low quality"></textarea>
          </label>

          <fieldset class="image-input" id="imageInput">
            <legend>图片条件</legend>
            <div class="condition-type-heading">
              <span>条件类型</span>
            </div>
            <div class="reference-mode" role="group" aria-label="图片条件类型">
              <button type="button" class="reference-mode-button active" data-reference-mode="single" aria-pressed="true">
                <strong>单张参考图</strong>
                <span>1 张图片</span>
              </button>
              <button type="button" class="reference-mode-button" data-reference-mode="multi" aria-pressed="false">
                <strong>首尾帧条件</strong>
                <span>2-4 张图片</span>
              </button>
            </div>

            <section class="condition-upload-panel" aria-labelledby="conditionPanelTitle">
              <header class="condition-upload-heading">
                <h3 id="conditionPanelTitle">上传参考图</h3>
                <span id="referenceSelectionStatus">已选择 0/1</span>
              </header>

              <article class="reference-card single-reference-card" id="singleImageField">
                <div class="reference-card-head">
                  <strong>参考图</strong>
                  <span>单图条件</span>
                </div>
                <div class="reference-preview" data-preview-for="inputImage"><span>REFERENCE</span></div>
                <label>
                  图片
                  <input id="inputImage" type="file" accept="image/png,image/jpeg,image/webp" />
                </label>
              </article>

              <div class="multi-reference-field" id="multiReferenceField" hidden>
                <div class="reference-frame-grid">
                  <article class="reference-card">
                    <div class="reference-card-head">
                      <strong>首帧</strong>
                      <span>0%</span>
                    </div>
                    <div class="reference-preview" data-preview-for="startImage"><span>START</span></div>
                    <label>
                      图片
                      <input id="startImage" type="file" accept="image/png,image/jpeg,image/webp" />
                    </label>
                    <label>
                      强度
                      <span class="range-control">
                        <input id="startStrength" type="range" min="0" max="1" step="0.05" value="0.9" />
                        <output for="startStrength">0.90</output>
                      </span>
                    </label>
                  </article>

                  <article class="reference-card">
                    <div class="reference-card-head">
                      <strong>尾帧</strong>
                      <span>100%</span>
                    </div>
                    <div class="reference-preview" data-preview-for="endImage"><span>END</span></div>
                    <label>
                      图片
                      <input id="endImage" type="file" accept="image/png,image/jpeg,image/webp" />
                    </label>
                    <label>
                      强度
                      <span class="range-control">
                        <input id="endStrength" type="range" min="0" max="1" step="0.05" value="0.8" />
                        <output for="endStrength">0.80</output>
                      </span>
                    </label>
                  </article>
                </div>

                <div class="middle-reference-list" id="middleReferences"></div>
                <button class="secondary add-reference" id="addMiddleReference" type="button">添加中间帧</button>
              </div>
            </section>
          </fieldset>

          <div class="controls">
            <label>
              Speed
              <select id="profile">
                <option value="fast">fast · 1 GPU</option>
                <option value="ultra" disabled>ultra · MGPU experimental</option>
                <option value="vip">vip · 4 GPU</option>
              </select>
            </label>
            <label>
              Duration
              <input id="duration" type="number" min="1" max="60" value="1" />
            </label>
            <label>
              Aspect
              <select id="aspectRatio">
                <option value="16:9">16:9</option>
                <option value="9:16">9:16</option>
                <option value="1:1">1:1</option>
                <option value="4:3">4:3</option>
                <option value="3:4">3:4</option>
              </select>
            </label>
            <label>
              Seed
              <input id="seed" type="number" placeholder="optional" />
            </label>
          </div>

          <button class="primary" id="submitGeneration" type="submit">生成视频</button>
          <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
        </form>

        <section class="preview" aria-label="Generation preview">
          <div class="preview-toolbar">
            <div>
              <p class="eyebrow">Result</p>
              <h2 id="selectedTaskTitle">未选择任务</h2>
            </div>
            <button class="secondary" id="refreshTasks" type="button">刷新</button>
          </div>
          <div class="video-stage" id="videoStage">
            <span>等待生成结果</span>
          </div>
          <div class="task-detail" id="taskDetail"></div>
        </section>
      </section>

      <section class="lower-grid">
        <section class="task-list" aria-label="Recent tasks">
          <div class="section-head">
            <div>
              <p class="eyebrow">Queue</p>
              <h2>最近任务</h2>
            </div>
            <button class="secondary danger" id="cancelTask" type="button">取消当前</button>
          </div>
          <div id="taskRows" class="rows"></div>
        </section>

        <section class="ops" aria-label="Operations">
          <div class="section-head">
            <div>
              <p class="eyebrow">Ops</p>
              <h2>运行状态</h2>
            </div>
            <button class="secondary" id="loadOps" type="button">加载</button>
          </div>
          <div class="ops-actions">
            <button class="secondary" id="dispatchOnce" type="button">派发一次</button>
            <button class="secondary" id="loadWorkflows" type="button">工作流</button>
          </div>
          <div id="opsOutput" class="ops-output"></div>
        </section>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
