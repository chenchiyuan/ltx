name: ltx-gpu

x-worker-build: &worker_build
  context: ..
  dockerfile: gpu_server/Dockerfile
  args:
    COMFYUI_REPO: ${COMFYUI_REPO:-https://github.com/comfyanonymous/ComfyUI.git}
    COMFYUI_REF: ${COMFYUI_REF:-5697b970173bc0c16a05c30d509d0911f2b84822}
    LTXVIDEO_REPO: ${LTXVIDEO_REPO:-https://github.com/Lightricks/ComfyUI-LTXVideo.git}
    LTXVIDEO_REF: ${LTXVIDEO_REF:-aceeae9635f6d493f2893ba3c411a1c36031788a}
    RES4LYF_REPO: ${RES4LYF_REPO:-https://github.com/ClownsharkBatwing/RES4LYF.git}
    RES4LYF_REF: ${RES4LYF_REF:-419de2d7c78f415dde9aa352a7231820ebfc17a4}
    PYTORCH_INDEX_URL: ${PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cu128}
    TORCH_VERSION: ${TORCH_VERSION:-2.8.0+cu128}
    TORCHVISION_VERSION: ${TORCHVISION_VERSION:-0.23.0+cu128}
    TORCHAUDIO_VERSION: ${TORCHAUDIO_VERSION:-2.8.0+cu128}

x-mgpu-worker-build: &mgpu_worker_build
  context: ..
  dockerfile: gpu_server/mgpu.Dockerfile
  args:
    LTX2_REPO: ${LTX2_REPO:-https://github.com/Lightricks/LTX-2.git}
    LTX2_REF: ${LTX2_REF:-9377758131b1ffde4b7f766804590a6617bf2ab9}
    PYTORCH_INDEX_URL: ${PYTORCH_INDEX_URL:-https://download.pytorch.org/whl/cu128}
    TORCH_VERSION: ${TORCH_VERSION:-2.8.0+cu128}
    TORCHVISION_VERSION: ${TORCHVISION_VERSION:-0.23.0+cu128}
    TORCHAUDIO_VERSION: ${TORCHAUDIO_VERSION:-2.8.0+cu128}

x-worker-env: &worker_env
  CONTROL_PLANE_URL: ${CONTROL_PLANE_URL:-http://control-plane:8000}
  WORKER_TOKEN: ${WORKER_TOKEN:?WORKER_TOKEN is required}
  NODE_NAME: ${NODE_NAME:-ltx-gpu-001}
  WORKER_STATUS: ${WORKER_STATUS:-unhealthy}
  WORKER_NOT_READY_REASON: ${WORKER_NOT_READY_REASON:-T204_ADAPTER_SKELETON}
  HEARTBEAT_INTERVAL_SECONDS: ${HEARTBEAT_INTERVAL_SECONDS:-15}
  START_COMFYUI: ${START_COMFYUI:-true}
  COMFYUI_HOST: ${COMFYUI_HOST:-127.0.0.1}
  COMFYUI_PORT: ${COMFYUI_PORT:-8188}
  WORKER_API_HOST: 0.0.0.0
  WORKER_API_PORT: "9000"
  WORKER_EXECUTION_BACKEND: ${WORKER_EXECUTION_BACKEND:-comfyui}
  MODEL_DIR: /opt/comfyui/models
  STORAGE_DIR: /data/ltx-storage

x-mgpu-worker-env: &mgpu_worker_env
  <<: *worker_env
  START_COMFYUI: "false"
  WORKER_EXECUTION_BACKEND: ltx_mgpu
  MODEL_DIR: /opt/ltx/models
  MGPU_CHECKPOINT_PATH: /opt/ltx/models/checkpoints/ltx-2.3-22b-dev.safetensors
  MGPU_DISTILLED_LORA_PATH: /opt/ltx/models/loras/ltxv/ltx2/ltx-2.3-22b-distilled-lora-384-1.1.safetensors
  MGPU_SPATIAL_UPSAMPLER_PATH: /opt/ltx/models/upscalers/ltx-2.3-spatial-upscaler-x2-1.1.safetensors
  MGPU_GEMMA_ROOT: /opt/ltx/models/gemma-3-12b-local
  MGPU_NUM_INFERENCE_STEPS: ${MGPU_NUM_INFERENCE_STEPS:-8}
  MGPU_START_TIMEOUT_SECONDS: ${MGPU_START_TIMEOUT_SECONDS:-3600}
  MGPU_JOB_TIMEOUT_SECONDS: ${MGPU_JOB_TIMEOUT_SECONDS:-7200}

x-worker-volumes: &worker_volumes
  - ${MODEL_DIR:-/opt/ltx/models}:/opt/comfyui/models
  - ${STORAGE_DIR:-/opt/ltx/storage}:/data/ltx-storage

x-mgpu-worker-volumes: &mgpu_worker_volumes
  - ${MODEL_DIR:-/opt/ltx/models}:/opt/ltx/models
  - ${STORAGE_DIR:-/opt/ltx/storage}:/data/ltx-storage

services:
  control-plane:
    image: ltx-gpu-control-plane
    build:
      context: ..
      dockerfile: gpu_server/control.Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      LTX_DATABASE_URL: sqlite:////app/.data/ltx.db
      LTX_STORAGE_BACKEND: ${STORAGE_BACKEND:-local_shared}
      LTX_STORAGE_ROOT: /data/ltx-storage
      LTX_BOOTSTRAP_API_KEY: ${BOOTSTRAP_API_KEY:?BOOTSTRAP_API_KEY is required}
      LTX_ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN is required}
      LTX_WORKER_TOKEN: ${WORKER_TOKEN:?WORKER_TOKEN is required}
      LTX_EXECUTOR_BACKEND: ${EXECUTOR_BACKEND:-gpu-worker}
      LTX_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      LTX_REQUIRE_ENV: "true"
    volumes:
      - ${APP_DATA_DIR:-/opt/ltx/app-data}:/app/.data
      - ${STORAGE_DIR:-/opt/ltx/storage}:/data/ltx-storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 20s
      timeout: 8s
      retries: 5

  dispatcher:
    image: ltx-gpu-control-plane
    restart: unless-stopped
    depends_on:
      control-plane:
        condition: service_healthy
    command: ["python", "-m", "ltx_service.dispatcher"]
    environment:
      CONTROL_PLANE_URL: http://control-plane:8000
      LTX_ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN is required}
      DISPATCH_INTERVAL_SECONDS: ${DISPATCH_INTERVAL_SECONDS:-5}
      DISPATCH_TIMEOUT_SECONDS: ${DISPATCH_TIMEOUT_SECONDS:-10}

  web-frontend:
    build:
      context: ..
      dockerfile: web_frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      control-plane:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"

  worker-fast-0:
    profiles: ["workers"]
    build: *worker_build
    restart: unless-stopped
    depends_on:
      control-plane:
        condition: service_healthy
    volumes: *worker_volumes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: ["gpu"]
    environment:
      <<: *worker_env
      GPU_INDEX: "0"
      GPU_IDS: "0"
      WORKER_SLOT: "0"
      WORKER_NAME: ltx-worker-fast-0
      WORKER_ASSIGN_HOST: worker-fast-0
      WORKER_PROFILES: fast

  worker-fast-1:
    profiles: ["workers"]
    build: *worker_build
